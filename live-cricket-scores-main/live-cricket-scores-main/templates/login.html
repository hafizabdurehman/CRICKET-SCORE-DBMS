<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Live Cricket Scores</title>
    <!-- Google Fonts for Modern Look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-theme">
    <div class="glass-container auth-container">
        <h2 class="text-center mb-4 text-white text-gradient">Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} glass-alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="text-light">Username</label>
                <input type="text" name="username" class="form-control glass-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="text-light">Password</label>
                <input type="password" name="password" class="form-control glass-input" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block glass-btn" style="background: var(--primary-gradient);">Login</button>
        </form>
        <p class="text-center mt-3 text-light opacity-75">Don't have an account? <a href="{{ url_for('register') }}" class="text-info font-weight-bold">Register</a></p>
        <div class="text-center mt-4">
             <a href="{{ url_for('index') }}" class="text-muted"><small>← Back to Home</small></a>
        </div>
    </div>
</body>
</html>
